title: "5. Functions — define, call, return"
order: 6
sections:
  - heading: መግለጫ
    body: |
      ተግባር name(param1, param2)
          ... body ...
          መልስ value
      መጨረሻ
  - heading: Define and call
    code_example: |
      # --- Define a function that adds two numbers ---
      ተግባር ድምር(a, b)
          መልስ a + b
      መጨረሻ

      # --- Call the function and store the result ---
      ቁጥር ውጤት = ድምር(5, 3)
      አትም "5 + 3 ="
      አትም ውጤት
  - heading: No parameters
    code_example: |
      # --- Function with no parameters ---
      ተግባር ሰላም()
          መልስ "ሰላም!"
      መጨረሻ

      አትም ሰላም()
  - heading: Function inside an expression
    code_example: |
      # --- Use a function inside an expression ---
      ቁጥር ትርፍ = ድምር(10, 4) * 2
      አትም "(10 + 4) * 2 ="
      አትም ትርፍ
