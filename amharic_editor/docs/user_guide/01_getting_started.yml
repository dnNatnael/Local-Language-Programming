title: መግቢያ
order: 1
sections:
  - heading: አማርኛ ፕሮግራሚንግ ቋንቋ (AML)
    body: |
      AML ትምህርታዊ ቋንቋ ነው። ቁልፍ ቃላት በአማርኛ ናቸው፤ ፕሮግራሙ ወደ Python ይተረጎማል።
      በአርታዒው ፋይል ይቀመጣል (.aml)፤ ጀምር (F5) ተርጉም እና አስፈጽማል።
  - heading: አርታዒ — ቀልጣፋ መንገዶች
    body: |
      • አዲስ ፋይል — Ctrl+N
      • ክፈት / አስቀምጥ — Ctrl+O / Ctrl+S
      • ተርጉም — Ctrl+T
      • ጀምር — F5
      • ፈልግ — Ctrl+F
  - heading: የመስኮት ክፍሎች
    body: |
      • ግራ — ፋይል ዝርዝር (examples/)
      • መካከል — ኮድ አርታዒ
      • ታች — ውጤት፣ ስህተቶች፣ Python፣ መዝገብ
